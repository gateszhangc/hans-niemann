apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hans-niemann
  namespace: argocd
spec:
  project: hans-niemann
  source:
    repoURL: https://github.com/gateszhangc/hans-niemann.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: hans-niemann
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

