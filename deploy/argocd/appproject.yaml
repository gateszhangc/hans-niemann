apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hans-niemann
  namespace: argocd
spec:
  description: Hans Niemann static site managed from the application repository
  sourceRepos:
    - https://github.com/gateszhangc/hans-niemann.git
  destinations:
    - namespace: hans-niemann
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

